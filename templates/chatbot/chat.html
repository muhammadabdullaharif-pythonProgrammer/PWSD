{% extends "base.html" %}
{% block title %}AI Assistant · PWDS{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card pwds-card shadow-sm">
      <div class="card-body">
        <h4 class="mb-3"><i class="bi bi-robot"></i> Cybersecurity Assistant</h4>
        <div id="chat-window" class="border rounded p-3 mb-3 bg-light" style="height:420px; overflow-y:auto">
          {% for h in history reversed %}
            <div class="mb-2"><b>You:</b> {{ h.question }}</div>
            <div class="mb-3 text-primary"><b>PWDS:</b> {{ h.answer }}</div>
          {% endfor %}
        </div>
        <form id="chat-form" class="d-flex gap-2">
          {% csrf_token %}
          <input id="chat-input" class="form-control" placeholder="Ask about phishing, scans, WHOIS, DNS…" maxlength="1000" required>
          <button class="btn btn-primary"><i class="bi bi-send"></i></button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>window.PWDS_BOOT = "chatbot";</script>
{% endblock %}
